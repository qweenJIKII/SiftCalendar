<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シフトカレンダー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-indigo-50 text-slate-800">

  <!-- トースト通知 -->
  <div id="toast"
    class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none"
  ></div>

  <div class="max-w-5xl mx-auto px-4 py-6">

    <h1 class="text-2xl font-bold text-center text-indigo-700 mb-6 tracking-wide">
      📅 シフト一括入力カレンダー
    </h1>

    <div class="flex flex-col lg:flex-row gap-6">

      <!-- 左ペイン：入力・設定エリア -->
      <div class="lg:w-72 flex-shrink-0 space-y-4">

        <!-- スタンプ選択 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-3">
          <h2 class="text-base font-bold text-slate-700">🎯 スタンプ選択</h2>
          <div class="flex flex-col gap-2">
            <button id="stamp-work"
              class="flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-50 border border-indigo-200 text-sm font-semibold text-indigo-700 transition-all">
              <span class="w-4 h-4 rounded-full bg-indigo-500 flex-shrink-0"></span>
              💼 仕事
            </button>
            <button id="stamp-holiday"
              class="flex items-center gap-2 px-3 py-2 rounded-lg bg-emerald-50 border border-emerald-200 text-sm font-semibold text-emerald-700 transition-all opacity-60">
              <span class="w-4 h-4 rounded-full bg-emerald-500 flex-shrink-0"></span>
              🏖️ 公休
            </button>
            <button id="stamp-errand"
              class="flex items-center gap-2 px-3 py-2 rounded-lg bg-amber-50 border border-amber-200 text-sm font-semibold text-amber-700 transition-all opacity-60">
              <span class="w-4 h-4 rounded-full bg-amber-500 flex-shrink-0"></span>
              📝 用事
            </button>
          </div>
        </div>

        <!-- 日付入力 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-3">
          <h2 class="text-base font-bold text-slate-700">📝 日付を入力</h2>
          <p class="text-xs text-slate-500 leading-relaxed">
            区切りまたは範囲指定で入力<br>
            例）<code class="bg-slate-100 px-1 rounded">1.8.12</code>　
               <code class="bg-slate-100 px-1 rounded">3-7</code>　
               <code class="bg-slate-100 px-1 rounded">10〜15</code>
          </p>
          <input id="day-input" type="text" inputmode="numeric"
            placeholder="例: 1.8.12 または 3-7"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 placeholder-slate-400 transition"
          />
          <button id="apply-btn"
            class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold text-sm py-2.5 rounded-lg transition-colors shadow-sm">
            カレンダーに反映
          </button>
        </div>

        <!-- 集計 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-2">
          <h2 class="text-base font-bold text-slate-700">📊 集計（表示月）</h2>
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500">💼 仕事</span>
            <span id="count-work" class="font-bold text-indigo-600">0 日</span>
          </div>
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500">🏖️ 公休</span>
            <span id="count-holiday" class="font-bold text-emerald-600">0 日</span>
          </div>
          <div class="flex justify-between items-center text-sm">
            <span class="text-slate-500">📝 用事</span>
            <span id="count-errand" class="font-bold text-amber-600">0 日</span>
          </div>
        </div>

        <!-- デフォルト勤務設定 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-3">
          <h2 class="text-base font-bold text-slate-700">🕐 デフォルト勤務設定</h2>
          <p class="text-xs text-slate-400">一括入力時に使用される初期値</p>
          <div class="space-y-2">
            <div class="flex items-center gap-2">
              <label class="text-xs text-slate-500 w-16 flex-shrink-0">開始時刻</label>
              <input id="def-start" type="time" value="09:00"
                class="flex-1 border border-slate-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
              />
            </div>
            <div class="flex items-center gap-2">
              <label class="text-xs text-slate-500 w-16 flex-shrink-0">終了時刻</label>
              <input id="def-end" type="time" value="17:30"
                class="flex-1 border border-slate-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
              />
            </div>
            <div class="flex items-center gap-2">
              <label class="text-xs text-slate-500 w-16 flex-shrink-0">休憩（分）</label>
              <input id="def-break" type="number" value="60" min="0" step="5"
                class="flex-1 border border-slate-300 rounded-lg px-2 py-1.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
              />
            </div>
          </div>
        </div>

        <!-- 給与シミュレーター -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-3">
          <h2 class="text-base font-bold text-slate-700">💰 給与シミュレーター</h2>
          <div class="flex items-center gap-2">
            <label class="text-xs text-slate-500 w-16 flex-shrink-0">時給（円）</label>
            <input id="wage-input" type="number" value="1100" min="0" step="10"
              class="flex-1 border border-slate-300 rounded-lg px-2 py-1.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
            />
          </div>
          <div class="bg-indigo-50 rounded-xl p-3 space-y-1">
            <div class="flex justify-between items-center">
              <span class="text-xs text-slate-500">総実働時間</span>
              <span id="count-work-hours" class="text-sm font-bold text-indigo-600">0時間</span>
            </div>
            <div class="border-t border-indigo-100 pt-1 mt-1 text-center">
              <p id="salary-detail" class="text-xs text-slate-400 mb-1">0.0h × ¥1,100</p>
              <p id="salary-est" class="text-2xl font-bold text-indigo-700">¥ 0</p>
            </div>
          </div>
        </div>

        <!-- 操作 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 space-y-3">
          <h2 class="text-base font-bold text-slate-700">⚙️ 操作</h2>
          <button id="clear-btn"
            class="w-full border border-red-300 text-red-500 hover:bg-red-50 active:bg-red-100 font-semibold text-sm py-2.5 rounded-lg transition-colors">
            表示月のシフトをクリア
          </button>
          <p class="text-xs text-slate-400 text-center leading-relaxed">
            日付マスをクリックで個別トグル
          </p>
        </div>

      </div>

      <!-- 右ペイン：カレンダー -->
      <div class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
        <div class="flex items-center justify-between mb-4">
          <!-- 月切替ボタン -->
          <button id="prev-month"
            class="w-9 h-9 flex items-center justify-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-100 active:bg-slate-200 transition text-lg font-bold">
            ‹
          </button>
          <h2 id="month-title" class="text-lg font-bold text-slate-700"></h2>
          <button id="next-month"
            class="w-9 h-9 flex items-center justify-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-100 active:bg-slate-200 transition text-lg font-bold">
            ›
          </button>
        </div>
        <div id="calendar-grid"></div>
      </div>

    </div>
  </div>

  <!-- 日別編集モーダル -->
  <div id="day-modal"
    class="hidden fixed inset-0 z-40 bg-black/40 items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 space-y-4">

      <!-- ヘッダー -->
      <div class="flex items-center justify-between">
        <h3 id="modal-title" class="text-base font-bold text-slate-700"></h3>
        <button id="modal-close"
          class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 transition text-xl leading-none">
          ✕
        </button>
      </div>

      <!-- スタンプ選択 -->
      <div class="space-y-1">
        <label class="text-xs font-semibold text-slate-500">スタンプ</label>
        <select id="modal-stamp"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition">
          <option value="work">💼 仕事</option>
          <option value="holiday">🏖️ 公休</option>
          <option value="errand">📝 用事</option>
        </select>
      </div>

      <!-- 時間設定（仕事のときのみ表示） -->
      <div id="modal-time-section" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-500">開始時刻</label>
            <input id="modal-start" type="time"
              class="w-full border border-slate-300 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
            />
          </div>
          <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-500">終了時刻</label>
            <input id="modal-end" type="time"
              class="w-full border border-slate-300 rounded-lg px-2 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
            />
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500">休憩時間（分）</label>
          <input id="modal-break" type="number" min="0" step="5"
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
          />
        </div>
        <!-- リアルタイム計算結果 -->
        <div class="bg-indigo-50 rounded-xl px-4 py-3 text-center">
          <p id="modal-calc" class="text-sm font-bold text-indigo-700">実働 0時間  ≈  ¥0</p>
        </div>
      </div>

      <!-- メモ入力 -->
      <div class="space-y-1">
        <label class="text-xs font-semibold text-slate-500">メモ（任意）</label>
        <input id="modal-memo" type="text" maxlength="20"
          placeholder="例：遅番、会議など"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-slate-400 transition"
        />
      </div>

      <!-- ボタン行 -->
      <div class="flex gap-2 pt-1">
        <button id="modal-delete"
          class="flex-1 border border-red-300 text-red-500 hover:bg-red-50 font-semibold text-sm py-2.5 rounded-lg transition-colors">
          削除
        </button>
        <button id="modal-save"
          class="flex-2 flex-grow-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-2.5 rounded-lg transition-colors shadow-sm">
          保存
        </button>
      </div>

    </div>
  </div>

  <script src="src/main.js"></script>
</body>
</html>
