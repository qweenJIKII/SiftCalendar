<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>シフトカレンダー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    /* アコーディオン本体 */
    .accordion-body {
      display: none;
    }
    .accordion-body.open {
      display: block;
    }
    /* カレンダーマス共通：縦に十分な高さを確保 */
    .day-cell {
      min-height: 64px;
      overflow: hidden;
    }
    /* スマホ：aspect-ratioで縦長固定 */
    @media (max-width: 1023px) {
      .day-cell {
        aspect-ratio: 1 / 1.55;
        height: auto !important;
        min-height: 0 !important;
      }
    }
    /* モーダル表示中は背景スクロール禁止（iOS Safari対応） */
    body.modal-open {
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-indigo-50 text-slate-800 pb-20 lg:pb-6">

  <!-- トースト通知 -->
  <div id="toast"
    class="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-full shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none"
  ></div>

  <!-- ===== スマホ固定ボトムバー（lg未満のみ表示） ===== -->
  <div class="lg:hidden fixed bottom-0 left-0 right-0 z-30 bg-white border-t border-slate-200 shadow-lg px-4 py-2 flex items-center justify-between gap-3">
    <div class="flex flex-col leading-tight">
      <span class="text-[10px] text-slate-400">今月の概算給与</span>
      <span id="salary-est-bar" class="text-lg font-bold text-indigo-700">¥ 0</span>
    </div>
    <div class="text-xs text-slate-400 text-right leading-snug">
      <span id="count-work-bar" class="font-semibold text-slate-600">0日</span>
      <span class="mx-1">/</span>
      <span id="count-work-hours-bar" class="font-semibold text-slate-600">0h</span>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-3 pt-4 pb-2 lg:px-4 lg:py-6">

    <h1 class="text-xl lg:text-2xl font-bold text-center text-indigo-700 mb-4 tracking-wide">
      📅 シフト一括入力カレンダー
    </h1>

    <div class="flex flex-col lg:flex-row gap-4 lg:gap-6">

      <!-- ===== 左ペイン（PC）/ 下部コントロール（スマホ） ===== -->
      <div class="lg:w-72 flex-shrink-0 space-y-3 order-2 lg:order-1">

        <!-- ① スタンプ選択（横3ボタン・コンパクト） -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-3 lg:p-5">
          <p class="text-xs font-bold text-slate-500 mb-2">🎯 スタンプ</p>
          <div class="grid grid-cols-3 gap-2">
            <button id="stamp-work"
              class="flex flex-col items-center gap-1 py-2 rounded-xl bg-indigo-50 border border-indigo-200 text-xs font-semibold text-indigo-700 transition-all active:scale-95">
              <span class="w-3 h-3 rounded-full bg-indigo-500"></span>💼 仕事
            </button>
            <button id="stamp-holiday"
              class="flex flex-col items-center gap-1 py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-xs font-semibold text-emerald-700 transition-all opacity-60 active:scale-95">
              <span class="w-3 h-3 rounded-full bg-emerald-500"></span>🏖️ 公休
            </button>
            <button id="stamp-errand"
              class="flex flex-col items-center gap-1 py-2 rounded-xl bg-amber-50 border border-amber-200 text-xs font-semibold text-amber-700 transition-all opacity-60 active:scale-95">
              <span class="w-3 h-3 rounded-full bg-amber-500"></span>📝 用事
            </button>
          </div>
        </div>

        <!-- ② 日付入力（1行レイアウト） -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-3 lg:p-5">
          <p class="text-xs font-bold text-slate-500 mb-2">📝 日付を入力
            <span class="font-normal text-slate-400 ml-1">（例: 1.8.12 / 3-7 / 10〜15）</span>
          </p>
          <div class="flex gap-2">
            <input id="day-input" type="text" inputmode="numeric"
              placeholder="1.8.12 または 3-7"
              class="flex-1 min-w-0 border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 placeholder-slate-400 transition"
            />
            <button id="apply-btn"
              class="flex-shrink-0 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-bold text-sm px-4 py-2.5 rounded-xl transition-colors shadow-sm">
              反映
            </button>
          </div>
        </div>

        <!-- ③ アコーディオン：集計 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <button class="accordion-toggle w-full flex items-center justify-between px-4 py-3 text-sm font-bold text-slate-700 active:bg-slate-50"
            data-target="acc-stats">
            <span>📊 集計（表示月）</span>
            <span class="accordion-icon text-slate-400 text-lg leading-none transition-transform">›</span>
          </button>
          <div id="acc-stats" class="accordion-body px-4 pb-3 space-y-2">
            <div class="flex justify-between items-center text-sm">
              <span class="text-slate-500">💼 仕事</span>
              <span id="count-work" class="font-bold text-indigo-600">0 日</span>
            </div>
            <div class="flex justify-between items-center text-sm">
              <span class="text-slate-500">🏖️ 公休</span>
              <span id="count-holiday" class="font-bold text-emerald-600">0 日</span>
            </div>
            <div class="flex justify-between items-center text-sm">
              <span class="text-slate-500">📝 用事</span>
              <span id="count-errand" class="font-bold text-amber-600">0 日</span>
            </div>
          </div>
        </div>

        <!-- ④ アコーディオン：デフォルト勤務設定 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <button class="accordion-toggle w-full flex items-center justify-between px-4 py-3 text-sm font-bold text-slate-700 active:bg-slate-50"
            data-target="acc-workdef">
            <span>🕐 デフォルト勤務設定</span>
            <span class="accordion-icon text-slate-400 text-lg leading-none transition-transform">›</span>
          </button>
          <div id="acc-workdef" class="accordion-body px-4 pb-3 space-y-2">
            <p class="text-xs text-slate-400">一括入力時に使用される初期値</p>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="text-xs text-slate-500 block mb-1">開始時刻</label>
                <input id="def-start" type="time" value="09:10"
                  class="w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
                />
              </div>
              <div>
                <label class="text-xs text-slate-500 block mb-1">終了時刻</label>
                <input id="def-end" type="time" value="17:00"
                  class="w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
                />
              </div>
            </div>
            <div>
              <label class="text-xs text-slate-500 block mb-1">休憩（分）</label>
              <input id="def-break" type="number" value="60" min="0" step="5"
                class="w-full border border-slate-300 rounded-lg px-2 py-1.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
              />
            </div>
          </div>
        </div>

        <!-- ⑤ アコーディオン：給与シミュレーター（PC常時表示・スマホはボトムバーで代替） -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <button class="accordion-toggle w-full flex items-center justify-between px-4 py-3 text-sm font-bold text-slate-700 active:bg-slate-50"
            data-target="acc-salary">
            <span>💰 給与シミュレーター</span>
            <span class="accordion-icon text-slate-400 text-lg leading-none transition-transform">›</span>
          </button>
          <div id="acc-salary" class="accordion-body px-4 pb-3 space-y-2">
            <div class="flex items-center gap-2">
              <label class="text-xs text-slate-500 w-14 flex-shrink-0">時給（円）</label>
              <input id="wage-input" type="number" value="1100" min="0" step="10"
                class="flex-1 border border-slate-300 rounded-lg px-2 py-1.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
              />
            </div>
            <div class="bg-indigo-50 rounded-xl p-3 space-y-1">
              <div class="flex justify-between items-center">
                <span class="text-xs text-slate-500">総実働時間</span>
                <span id="count-work-hours" class="text-sm font-bold text-indigo-600">0時間</span>
              </div>
              <div class="border-t border-indigo-100 pt-1 mt-1 text-center">
                <p id="salary-detail" class="text-xs text-slate-400 mb-1">0.0h × ¥1,100</p>
                <p id="salary-est" class="text-2xl font-bold text-indigo-700">¥ 0</p>
              </div>
            </div>
          </div>
        </div>

        <!-- ⑥ アコーディオン：操作 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
          <button class="accordion-toggle w-full flex items-center justify-between px-4 py-3 text-sm font-bold text-slate-700 active:bg-slate-50"
            data-target="acc-ops">
            <span>⚙️ 操作</span>
            <span class="accordion-icon text-slate-400 text-lg leading-none transition-transform">›</span>
          </button>
          <div id="acc-ops" class="accordion-body px-4 pb-3 space-y-2">
            <button id="clear-btn"
              class="w-full border border-red-300 text-red-500 hover:bg-red-50 active:bg-red-100 font-semibold text-sm py-2.5 rounded-lg transition-colors">
              表示月のシフトをクリア
            </button>
            <p class="text-xs text-slate-400 text-center">日付マスをクリックで個別編集</p>
          </div>
        </div>

      </div>

      <!-- ===== 右ペイン：カレンダー ===== -->
      <div class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 p-3 lg:p-5 order-1 lg:order-2">
        <div class="flex items-center justify-between mb-3">
          <button id="prev-month"
            class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:bg-slate-100 active:bg-slate-200 transition text-xl font-bold">
            ‹
          </button>
          <h2 id="month-title" class="text-base lg:text-lg font-bold text-slate-700"></h2>
          <button id="next-month"
            class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:bg-slate-100 active:bg-slate-200 transition text-xl font-bold">
            ›
          </button>
        </div>
        <div id="calendar-grid"></div>
      </div>

    </div>
  </div>

  <!-- ===== 日別プレビューシート ===== -->
  <div id="day-preview"
    class="hidden fixed inset-0 z-40 bg-black/40 items-end lg:items-center justify-center">
    <div class="bg-white w-full lg:max-w-sm lg:rounded-2xl rounded-t-2xl shadow-xl p-5 space-y-4">
      <!-- ヘッダー -->
      <div class="flex items-center justify-between">
        <h3 id="preview-title" class="text-base font-bold text-slate-700"></h3>
        <button id="preview-close"
          class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 transition text-xl leading-none">✕</button>
      </div>
      <!-- 状態表示 -->
      <div id="preview-body" class="space-y-2 text-sm text-slate-700"></div>
      <!-- ボタン行 -->
      <div class="flex gap-2 pt-1">
        <button id="preview-delete"
          class="flex-1 border border-red-300 text-red-500 font-semibold text-sm py-3 rounded-xl transition-colors hover:bg-red-50">
          削除
        </button>
        <button id="preview-edit"
          class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-3 rounded-xl transition-colors shadow-sm">
          ✏️ 編集
        </button>
      </div>
    </div>
  </div>

  <!-- ===== 日別編集モーダル ===== -->
  <div id="day-modal"
    class="hidden fixed inset-0 z-40 bg-black/40 items-end lg:items-center justify-center">
    <!-- スマホはシート風にボトムから、PCはセンター -->
    <div class="bg-white w-full lg:max-w-sm lg:rounded-2xl rounded-t-2xl shadow-xl p-5 space-y-4 max-h-[92vh] overflow-y-auto">

      <!-- ヘッダー -->
      <div class="flex items-center justify-between">
        <h3 id="modal-title" class="text-base font-bold text-slate-700"></h3>
        <button id="modal-close"
          class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:bg-slate-100 transition text-xl leading-none">
          ✕
        </button>
      </div>

      <!-- スタンプ選択（横3ボタン） -->
      <div class="space-y-1">
        <label class="text-xs font-semibold text-slate-500">スタンプ</label>
        <div class="grid grid-cols-3 gap-2">
          <button class="modal-stamp-btn py-2 rounded-xl bg-indigo-50 border border-indigo-200 text-xs font-bold text-indigo-700 active:scale-95 transition-all" data-value="work">💼 仕事</button>
          <button class="modal-stamp-btn py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-xs font-bold text-emerald-700 active:scale-95 transition-all opacity-60" data-value="holiday">🏖️ 公休</button>
          <button class="modal-stamp-btn py-2 rounded-xl bg-amber-50 border border-amber-200 text-xs font-bold text-amber-700 active:scale-95 transition-all opacity-60" data-value="errand">📝 用事</button>
        </div>
        <!-- hidden select for compatibility -->
        <select id="modal-stamp" class="hidden">
          <option value="work">仕事</option>
          <option value="holiday">公休</option>
          <option value="errand">用事</option>
        </select>
      </div>

      <!-- 時間設定（仕事のときのみ表示） -->
      <div id="modal-time-section" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-500">開始時刻</label>
            <input id="modal-start" type="time"
              class="w-full border border-slate-300 rounded-xl px-2 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
            />
          </div>
          <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-500">終了時刻</label>
            <input id="modal-end" type="time"
              class="w-full border border-slate-300 rounded-xl px-2 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
            />
          </div>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-semibold text-slate-500">休憩時間（分）</label>
          <input id="modal-break" type="number" min="0" step="5"
            class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm text-right focus:outline-none focus:ring-2 focus:ring-indigo-300 transition"
          />
        </div>
        <div class="bg-indigo-50 rounded-xl px-4 py-3 text-center">
          <p id="modal-calc" class="text-sm font-bold text-indigo-700">実働 0時間  ≈  ¥0</p>
        </div>
      </div>

      <!-- メモ入力 -->
      <div class="space-y-1">
        <label class="text-xs font-semibold text-slate-500">メモ（任意）</label>
        <input id="modal-memo" type="text" maxlength="20"
          placeholder="例：遅番、会議など"
          class="w-full border border-slate-300 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300 placeholder-slate-400 transition"
        />
      </div>

      <!-- ボタン行 -->
      <div class="flex gap-2 pt-1">
        <button id="modal-delete"
          class="flex-1 border border-red-300 text-red-500 hover:bg-red-50 font-semibold text-sm py-3 rounded-xl transition-colors">
          削除
        </button>
        <button id="modal-save"
          class="flex-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-semibold text-sm py-3 rounded-xl transition-colors shadow-sm">
          保存
        </button>
      </div>

    </div>
  </div>

  <script src="src/main.js"></script>
</body>
</html>
